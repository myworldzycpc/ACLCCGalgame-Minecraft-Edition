  default_pos: 38.5 -60.0 13.5 0 0

scenes:
  - name: intro
    pos: 0 0 0 0 0

characters:
  - id: lfbgsy
    name: 凌风白给施炎
    pos: 6.08 -60.00 23.97 -24.75 6.00
  - id: yoosee
    name: 祐荽
  - id: xlj
    name: 小绿君

dialogs:
  - label: intro
  - stopsound
  - scene: sky
    transition: fade
  - define: { l: lfbgsy, r: yoosee, m: xlj }
  - 作为一个二线城市普通家庭的学生，你比大多数人更容易接触到一些新潮的事物。
  - "同样的，作为一个二线城市普通家庭的学生，\n你的一些爱好往往并不能找到与你志同道合的伙伴。"
  - "你不是一个外向的学生，只是一个班里的小透明。\n有着普通的父母，住着普通的房子，上着普通的学校，学习也普普通通。"
  - "不是什么大家口里的坏孩子，\n但也不是别人家长口中的“别人家的孩子”。"
  - 日子就这么普普通通的过着......
  
  - scene: home_moon
    transition: fade
  - notify: 2020年某日
  - pause: 3
  - playsound: agme:mus_astral_calm
    title: ♪ ms_win_and_mc - Astral Calm
  - 大概是2020年的某一天，你偶然在某个视频网站上解接触到了一款游戏。
  - 作为一款音乐游戏，它的玩法极其简单。
  - narration:
      translate: "在游戏官网详情页上是这么写的：\n%s"
      with: 
        - translate: "“只需一个按键，控制盘旋飞舞的双星，踏着摇曳的舞步，\n在一条跟随音乐节奏变化的蜿蜒道路上不断前进，探索音乐的宇宙。”"
          color: "#ffffcc"
          italic: true
  - "当然，那时的你并没有看见这句话，\n不过别人的游玩过程依然勾起了你的好奇心。"
  - "在刷了几个下方的推荐视频后，你萌生了尝试的想法，\n不过那时的你并没有零花钱。"
  - "尽管26元的游戏已经算是廉价，\n但对于只在父母手机上玩过一些免费小游戏的你来说，依然是一笔巨款。"
  - narration: 
      translate: 不得已，你只能在搜索结果下的无数广告里下载了一个%s将就着玩。
      with: [{translate: "“渠道版”", color: yellow}]

  - scene: sbeam
    transition: dissolve
  - 在将游戏里的关卡翻来覆去的打了好几遍之后，你开始觉得无聊了。
  - "作为一个社区内容占了极大比例的游戏，\n“渠道版”不能联网的弊端越发明显。"
  - 虽然游戏里也内置了编辑器，但是那时的你对此一窍不通。
  - 在网站上看到的关卡，简介里的链接也往往是创意工坊或是外网的云盘。
  - "最终，在经历了几天的心理斗争之后，你跟着网上的教程下载了Sbeam，\n又偷偷用父母的信用卡笨拙地按照指示付了款。"
  - stopsound
  - narration: 
      translate: "然而，在你购买游戏后没几天，国外论坛在国内有了%s，\n可以方便的下载谱面。"
      with: [{translate: "镜像服务器", color: green}]
  - 这让你的心理斗争与购买游戏的行为显得如此愚蠢。
  - playsound: agme:mus_astral_calm

  - 虽然你在知道这则消息之后气的跳脚，但是你并没有抛弃这款游戏。
  - 一方面是，你认为这是第一个属于自己的东西。
  - 那时候的家里，电脑是父母的，手机是父母的，钱也是父母的。
  - 虽然买游戏的钱来自父母，但是你觉得游戏是属于自己的，有了感情。
  - 另外一方面是，26元对你而言真的很贵。
  - 总之，在购买了正版之后，你接触到了更多你喜欢的谱面，技术也在一天一天的提高。
  - 当然，你父母最终知道了这件事。
  - 他们并没有斥责你，只是用一种深邃的眼神看着你。
  - stopsound

  - scene: sky
    transition: dissolve
  - "对于经历着忽略式教育的你，在你做错事的时候，\n这种眼神已经见过无数次。"
  - "像以前一样，他们问了你钱的来源，钱的数目，买了什么东西，\n以及做这一切的原因。"
  - 在这期间，他们一直在用这种眼神与你对视，长达数分钟。
  - narration:
      translate: 最后，随着一句%s，谈话结束。
      with: [{translate: "“下不为例。”", color: "#ff9999"}]
  - 这样的谈话你已经经历了很多次。
  - "对你的父母来说，他们并不觉得你会误入歧途，\n但也没在你身上看见可能。"
  - "父母都忙于生计，并不关注你，他们也认为你懂事，\n因此家庭氛围还算融洽。"
  - 而这样的家庭也养成了你内向的性格。
  - "你也没在学校里大肆宣传这个游戏，\n即使偶尔和几个关系近的同学提起，他们也不感兴趣。"
  - 日子依旧普普通通的过着......







    
